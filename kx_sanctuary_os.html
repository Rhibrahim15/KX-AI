<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KX Sanctuary • Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .chat-container { height: 420px; overflow-y: auto; }
    .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; margin: 8px 0; }
    .user { background: #6366f1; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .ai { background: #272b35; border-bottom-left-radius: 4px; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-2xl mx-auto p-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center">
          <i class="fa-solid fa-robot"></i>
        </div>
        <div>
          <div class="font-semibold text-xl">KX Sanctuary</div>
          <div class="text-xs text-emerald-400">Online</div>
        </div>
      </div>
      <div class="text-xs px-3 py-1 bg-zinc-900 rounded-full border border-white/10">Free</div>
    </div>

    <!-- Chat -->
    <div class="bg-zinc-900 border border-white/10 rounded-3xl p-1">
      <div class="bg-zinc-950 rounded-[22px] p-6">
        <div id="messages" class="chat-container flex flex-col mb-4 pr-2"></div>
        
        <div class="flex gap-2">
          <input id="input" type="text" 
                 class="flex-1 bg-zinc-800 border border-white/10 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500"
                 placeholder="Type your message..." 
                 onkeypress="if(event.key==='Enter') sendMessage()">
          <button onclick="sendMessage()" 
                  class="px-6 bg-indigo-600 hover:bg-indigo-500 rounded-2xl text-sm font-medium transition-colors">
            Send
          </button>
        </div>
      </div>
    </div>

    <div class="mt-4 text-center">
      <button onclick="testAPI()" 
              class="text-xs text-zinc-400 hover:text-white px-4 py-1">
        Test API Connection
      </button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');

    function addMessage(text, isUser = false) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user' : 'ai'} text-sm`;
      msg.textContent = text;
      messagesDiv.appendChild(msg);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      // Add loading
      const loading = document.createElement('div');
      loading.className = 'message ai text-sm text-zinc-400';
      loading.textContent = 'Thinking...';
      messagesDiv.appendChild(loading);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      try {
        const res = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{ role: "user", content: text }]
          })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        loading.remove();

        const reply = data.choices?.[0]?.message?.content || "No response";
        addMessage(reply);
      } catch (err) {
        loading.remove();
        addMessage("Failed to connect to the server. Check console for details.");
        console.error("Fetch error:", err);
      }
    }

    async function testAPI() {
      try {
        const res = await fetch('/v1/health');
        const data = await res.json();
        alert(`API is working! Status: ${data.status}`);
      } catch (e) {
        alert("API test failed. Check if the server is running.");
      }
    }

    // Welcome message
    window.onload = () => {
      addMessage("Hello! I'm KX. How can I help you?");
      input.focus();
    }
  </script>
</body>
</html>
